<svg width="700" viewBox="0 0 680 412" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Menlo','Consolas','Liberation Mono',monospace">
<title>Example claude-code-radar dashboard</title>
<desc>A terminal window showing the Mission Control dashboard with example project names, color-coded for attention items.</desc>
<rect x="8" y="8" width="664" height="396" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<path d="M8 38 h664" stroke="#30363d" stroke-width="1"/>
<circle cx="30" cy="23" r="6" fill="#ff5f56"/>
<circle cx="50" cy="23" r="6" fill="#ffbd2e"/>
<circle cx="70" cy="23" r="6" fill="#27c93f"/>
<text x="340" y="27" text-anchor="middle" font-size="12" fill="#8b949e">mission-control — zsh</text>
<g font-size="13" xml:space="preserve">
<text x="28" y="74" fill="#3fb950" font-weight="500">===============================================</text>
<text x="28" y="92" fill="#3fb950" font-weight="500">  MISSION CONTROL — 2026-06-24 22:02</text>
